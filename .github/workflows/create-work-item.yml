name: Create branch and draft pull request

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: work-item-${{ github.event.issue.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  create-work-item:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'status:ready')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}

    steps:
      - name: Create work item
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORK_ITEM_TOKEN || secrets.GYMTRACK_PROJECT_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const number = Number(process.env.ISSUE_NUMBER);
            if (!Number.isInteger(number) || number < 1) {
              core.setFailed(`Invalid issue number: ${process.env.ISSUE_NUMBER}`);
              return;
            }

            const issue = (await github.rest.issues.get({
              owner, repo, issue_number: number
            })).data;
            const labels = issue.labels.map(label =>
              typeof label === 'string' ? label : label.name
            );

            if (issue.pull_request || !labels.includes('status:ready')) {
              core.setFailed(`#${number} must be an issue with status:ready.`);
              return;
            }

            const prefix = labels.includes('type:bug') ? 'fix'
              : labels.includes('type:refactor') ? 'refactor'
              : labels.includes('type:docs') ? 'docs'
              : labels.includes('type:chore') ? 'chore'
              : labels.includes('type:spike') ? 'spike'
              : 'feat';
            const slug = issue.title.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '')
              .slice(0, 50);
            const branch = `${prefix}/${number}-${slug || 'work-item'}`;
            const base = (await github.rest.repos.get({ owner, repo })).data.default_branch;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'all', head: `${owner}:${branch}`, per_page: 100
            });
            if (pulls.length) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: number,
                body: `Work item already exists: ${pulls[0].html_url}`
              });
              return;
            }

            let exists = true;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            } catch (error) {
              if (error.status !== 404) throw error;
              exists = false;
            }

            if (!exists) {
              const baseRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${base}` });
              const commit = await github.rest.git.getCommit({
                owner, repo, commit_sha: baseRef.data.object.sha
              });
              const initial = await github.rest.git.createCommit({
                owner, repo,
                message: `chore: start work on #${number}`,
                tree: commit.data.tree.sha,
                parents: [baseRef.data.object.sha]
              });
              await github.rest.git.createRef({
                owner, repo, ref: `refs/heads/${branch}`, sha: initial.data.sha
              });
            }

            let pull;
            try {
              pull = await github.rest.pulls.create({
                owner, repo, head: branch, base, draft: true,
                title: `${prefix}: ${issue.title}`,
                body: `## Linked issue\n\nCloses #${number}\n\nDraft created for an issue with \`status:ready\`.`
              });
            } catch (error) {
              if (error.status === 403) {
                core.setFailed(
                  'Pull-request creation was forbidden. Configure WORK_ITEM_TOKEN or ' +
                  'GYMTRACK_PROJECT_TOKEN with repository write access, or enable ' +
                  'Actions pull-request creation in repository settings.'
                );
                return;
              }
              throw error;
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: `Implementation started.\n\n- Branch: \`${branch}\`\n- Draft pull request: ${pull.data.html_url}`
            });
