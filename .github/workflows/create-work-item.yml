name: Create branch and draft pull request

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: work-item-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-work-item:
    if: github.event.label.name == 'status:ready' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest

    steps:
      - name: Create work branch and draft pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => typeof label === 'string' ? label : label.name);

            const prefix = labels.includes('type:bug') ? 'fix'
              : labels.includes('type:refactor') ? 'refactor'
              : labels.includes('type:docs') ? 'docs'
              : labels.includes('type:chore') ? 'chore'
              : labels.includes('type:spike') ? 'spike'
              : 'feat';

            const slug = issue.title
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '')
              .slice(0, 50);

            const branchName = `${prefix}/${issue.number}-${slug || 'work-item'}`;
            const repository = await github.rest.repos.get({ owner, repo });
            const base = repository.data.default_branch;

            const existingPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'all',
              head: `${owner}:${branchName}`,
              per_page: 100
            });

            if (existingPulls.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Work item already exists: ${existingPulls[0].html_url}`
              });
              return;
            }

            let branchExists = true;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branchName}` });
            } catch (error) {
              if (error.status !== 404) throw error;
              branchExists = false;
            }

            if (!branchExists) {
              const baseRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${base}` });
              const baseCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: baseRef.data.object.sha });
              const initialCommit = await github.rest.git.createCommit({
                owner,
                repo,
                message: `chore: start work on #${issue.number}`,
                tree: baseCommit.data.tree.sha,
                parents: [baseRef.data.object.sha]
              });

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branchName}`,
                sha: initialCommit.data.sha
              });
            }

            const pull = await github.rest.pulls.create({
              owner,
              repo,
              title: `${prefix}: ${issue.title.replace(/^(bug|feat|feature|refactor|docs|chore|spike):\s*/i, '')}`,
              head: branchName,
              base,
              draft: true,
              body: `## Linked issue\n\nCloses #${issue.number}\n\n## Problem\n\n${issue.title}\n\n## Implementation\n\nDraft created automatically when the issue received \`status:ready\`. Complete the repository pull-request template before review.`
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: `Implementation started.\n\n- Branch: \`${branchName}\`\n- Draft pull request: ${pull.data.html_url}`
            });
