name: Migration Tests

on:
  pull_request:
    branches: [master]
    paths:
      - "app/src/main/java/com/example/gymtrack/core/data/**"
      - "app/src/androidTest/**"
      - ".github/workflows/migration-tests.yml"
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: migration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run connected tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          disable-animations: true
          script: |
            set -o pipefail
            ./gradlew connectedDebugAndroidTest --console=plain 2>&1 | tee connected-test.log
      - name: Collect connected test diagnostics
        if: always()
        run: |
          mkdir -p diagnostics
          cp connected-test.log diagnostics/connected-test.log 2>/dev/null || true
          find app/build -type f | sort > diagnostics/all-build-files.txt || true
          find app/build -type f \( -name '*.xml' -o -name '*.html' -o -name '*.txt' \) | while read -r file; do
            mkdir -p "diagnostics/$(dirname "$file")"
            cp "$file" "diagnostics/$file"
          done
      - name: Print connected test failures
        if: failure()
        run: |
          tail -200 diagnostics/connected-test.log || true
          find diagnostics -type f -name '*.xml' -print -exec cat {} \; || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-test-reports
          path: diagnostics/
          if-no-files-found: error
          retention-days: 7
