name: Migration Tests

on:
  pull_request:
    branches: [master]
    paths:
      - "app/src/main/java/com/example/gymtrack/core/data/**"
      - "app/src/androidTest/**"
      - ".github/workflows/migration-tests.yml"
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: migration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run connected tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --console=plain
      - name: Print connected test failures
        if: failure()
        run: |
          find app/build/outputs/androidTest-results -type f -name '*.xml' -print -exec cat {} \; || true
          find app/build/reports/androidTests -type f -name '*.html' -print || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-test-reports
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          if-no-files-found: ignore
          retention-days: 7
