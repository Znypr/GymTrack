name: CI Failure Summary

on:
  workflow_run:
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  summarize:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name != 'CI Failure Summary' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment on failed pull request checks
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (prs.length === 0) {
              core.notice(`No pull request is associated with failed run ${run.id}.`);
              return;
            }

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const failedJobs = jobs.filter((job) => job.conclusion === "failure");
            const failedJobList = failedJobs.length > 0
              ? failedJobs.map((job) => `- ${job.name}`).join("\n")
              : "- No failed job details returned by the Actions API.";

            const marker = `<!-- ci-failure-summary:${run.id} -->`;
            const body = `${marker}\n## CI failure detected\n\n` +
              `Workflow: **${run.name}**\n\n` +
              `Run: ${run.html_url}\n\n` +
              `Head SHA: \`${run.head_sha}\`\n\n` +
              `Failed jobs:\n${failedJobList}\n\n` +
              `Automation policy: inspect logs and artifacts before patching. Only low-risk compile, import, lint, formatting, dependency, or test-API failures may be patched automatically.`;

            for (const pr of prs) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ["ci:failed"],
              }).catch((error) => core.warning(`Could not add ci:failed to #${pr.number}: ${error.message}`));

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
              }
            }
