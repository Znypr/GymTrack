name: Sync GitHub Project status

on:
  issues:
    types: [opened, reopened, closed, labeled, unlabeled]
  pull_request:
    types: [opened, reopened, converted_to_draft, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to synchronize
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: project-status-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-project:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PROJECT_OWNER: Znypr
      PROJECT_NUMBER: "1"

    steps:
      - name: Synchronize issue status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GYMTRACK_PROJECT_TOKEN }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const { owner, repo } = context.repo;
            const norm = value => value.trim().toLowerCase();

            const statuses = [
              { name: 'Ideas', aliases: ['Inbox', 'Triage', 'Needs decision'], color: 'PINK', description: 'Raw idea, unclear item, or unclassified ticket' },
              { name: 'Planned', aliases: ['Backlog'], color: 'YELLOW', description: 'Valid ticket that is not executable yet' },
              { name: 'Ready', aliases: [], color: 'BLUE', description: 'Specified ticket that can enter implementation' },
              { name: 'In Progress', aliases: ['Doing'], color: 'RED', description: 'Implementation is active' },
              { name: 'Needs Manual Review', aliases: ['Needs Review', 'In Review', 'Review', 'Validation'], color: 'PURPLE', description: 'Needs manual review, runtime validation, or final confirmation' },
              { name: 'Completed', aliases: ['Done'], color: 'GREEN', description: 'Completed, merged, closed, or otherwise finished' }
            ];

            const statusLabelToProject = new Map([
              ['status:ideas', 'Ideas'],
              ['status:needs-triage', 'Ideas'],
              ['status:planned', 'Planned'],
              ['status:ready', 'Ready'],
              ['status:in-progress', 'In Progress'],
              ['status:needs-manual-review', 'Needs Manual Review'],
              ['status:needs-review', 'Needs Manual Review'],
              ['status:validation', 'Needs Manual Review'],
              ['status:completed', 'Completed']
            ]);

            const projectToStatusLabel = new Map([
              ['Ideas', 'status:ideas'],
              ['Planned', 'status:planned'],
              ['Ready', 'status:ready'],
              ['In Progress', 'status:in-progress'],
              ['Needs Manual Review', 'status:needs-manual-review'],
              ['Completed', 'status:completed']
            ]);

            const allWorkflowStatusLabels = new Set([
              ...statusLabelToProject.keys(),
              'status:blocked',
              'status:needs-decision'
            ]);

            const projectResult = await github.graphql(
              `query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name color description }
                        }
                      }
                    }
                  }
                }
              }`,
              { login: projectOwner, number: projectNumber }
            );

            const project = projectResult.user.projectV2;
            const statusField = project.fields.nodes.find(field => field?.name === 'Status');
            if (!statusField) throw new Error('Project Status field not found.');

            const usedIds = new Set();
            const options = statuses.map(status => {
              const names = [status.name, ...status.aliases].map(norm);
              const existing = statusField.options.find(option => names.includes(norm(option.name)) && !usedIds.has(option.id));
              if (existing) usedIds.add(existing.id);
              return {
                ...(existing?.id ? { id: existing.id } : {}),
                name: status.name,
                color: status.color,
                description: status.description
              };
            });

            await github.graphql(
              `mutation($fieldId: ID!, $options: [ProjectV2SingleSelectFieldOptionInput!]!) {
                updateProjectV2Field(input: { fieldId: $fieldId, singleSelectOptions: $options }) {
                  projectV2Field { ... on ProjectV2SingleSelectField { id } }
                }
              }`,
              { fieldId: statusField.id, options }
            );

            const refreshed = await github.graphql(
              `query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }`,
              { login: projectOwner, number: projectNumber }
            );

            const refreshedProject = refreshed.user.projectV2;
            const refreshedStatus = refreshedProject.fields.nodes.find(field => field?.name === 'Status');
            const optionByName = new Map(refreshedStatus.options.map(option => [option.name, option.id]));

            async function findOrAddItem(issue) {
              let cursor = null;
              do {
                const result = await github.graphql(
                  `query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes { id content { ... on Issue { id } } }
                        }
                      }
                    }
                  }`,
                  { projectId: refreshedProject.id, cursor }
                );
                const items = result.node.items;
                const found = items.nodes.find(item => item.content?.id === issue.node_id);
                if (found) return found.id;
                cursor = items.pageInfo.hasNextPage ? items.pageInfo.endCursor : null;
              } while (cursor);

              const added = await github.graphql(
                `mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } }
                }`,
                { projectId: refreshedProject.id, contentId: issue.node_id }
              );
              return added.addProjectV2ItemById.item.id;
            }

            async function setStatus(itemId, status) {
              if (!status) return;
              const optionId = optionByName.get(status);
              if (!optionId) throw new Error(`Missing Project status option: ${status}`);
              await github.graphql(
                `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }`,
                { projectId: refreshedProject.id, itemId, fieldId: refreshedStatus.id, optionId }
              );
            }

            function labelNames(issue) {
              return issue.labels.map(label => typeof label === 'string' ? label : label.name);
            }

            function statusFromLabels(issue) {
              const labels = new Set(labelNames(issue));
              const eventLabel = context.eventName === 'issues' ? context.payload.label?.name : null;
              if (eventLabel && statusLabelToProject.has(eventLabel)) {
                return statusLabelToProject.get(eventLabel);
              }

              const precedence = [
                'status:completed',
                'status:needs-manual-review',
                'status:needs-review',
                'status:validation',
                'status:in-progress',
                'status:ready',
                'status:planned',
                'status:ideas',
                'status:needs-triage'
              ];
              const found = precedence.find(label => labels.has(label));
              return found ? statusLabelToProject.get(found) : null;
            }

            function issueStatus(issue, linkedPullRequest) {
              if (issue.state === 'closed' || linkedPullRequest?.merged) return 'Completed';
              if (linkedPullRequest && linkedPullRequest.state === 'open') {
                return linkedPullRequest.draft ? 'In Progress' : 'Needs Manual Review';
              }
              const labeledStatus = statusFromLabels(issue);
              if (labeledStatus) return labeledStatus;
              if (context.eventName === 'issues' && ['opened', 'reopened'].includes(context.payload.action)) return 'Ideas';
              return 'Planned';
            }

            async function ensureSingleStatusLabel(issue, status) {
              const desired = projectToStatusLabel.get(status);
              if (!desired) return;

              const labels = new Set(labelNames(issue));
              const removals = [...labels].filter(label => allWorkflowStatusLabels.has(label) && label !== desired);

              for (const label of removals) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: label
                });
              }

              if (!labels.has(desired)) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: [desired]
                });
              }
            }

            function closingIssues(body) {
              const found = new Set();
              for (const match of body?.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi) ?? []) {
                found.add(Number(match[1]));
              }
              return [...found];
            }

            async function linkedIssues(pullRequest) {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 50) { nodes { number } }
                    }
                  }
                }`,
                { owner, repo, number: pullRequest.number }
              );
              return [...new Set([
                ...result.repository.pullRequest.closingIssuesReferences.nodes.map(issue => issue.number),
                ...closingIssues(pullRequest.body)
              ])];
            }

            let numbers = [];
            let linkedPullRequest = null;
            if (context.eventName === 'workflow_dispatch') numbers = [Number(context.payload.inputs.issue_number)];
            if (context.eventName === 'issues') numbers = [context.payload.issue.number];
            if (context.eventName === 'pull_request') {
              linkedPullRequest = context.payload.pull_request;
              numbers = await linkedIssues(linkedPullRequest);
            }

            for (const number of numbers.filter(number => Number.isInteger(number) && number > 0)) {
              const issue = (await github.rest.issues.get({ owner, repo, issue_number: number })).data;
              if (issue.pull_request) continue;
              const status = issueStatus(issue, linkedPullRequest);
              const itemId = await findOrAddItem(issue);
              await setStatus(itemId, status);
              await ensureSingleStatusLabel(issue, status);
            }
