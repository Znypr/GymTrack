name: Sync Creator OS Operations Project

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]
  pull_request:
    types: [opened, edited, synchronize, reopened, converted_to_draft, ready_for_review, closed]
  push:
    branches: [master]
    paths:
      - .github/workflows/sync-project-status.yml
      - .github/labels.json
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional issue number to synchronize. Leave empty to sync all issues, including closed issues.
        required: false
        type: number
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: creator-os-project-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-project:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROJECT_OWNER: Znypr
      PROJECT_NUMBER: "2"
      DEFAULT_AREA: App

    steps:
      - name: Skip pull request side effects
        if: github.event_name == 'pull_request'
        run: echo "Project sync mutates the user Project, so pull request checks are validation-only. Sync runs on issue events, push, schedule, and manual dispatch."

      - name: Synchronize issue metadata
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CREATOR_OS_PROJECT_TOKEN || secrets.GYMTRACK_PROJECT_TOKEN }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const defaultArea = process.env.DEFAULT_AREA;
            const { owner, repo } = context.repo;
            const norm = value => String(value || '').trim().toLowerCase();

            const statusByLabel = new Map([
              ['status:ideas', 'Ideas'],
              ['status:planned', 'Planned'],
              ['status:ready', 'Ready'],
              ['status:in-progress', 'In Progress'],
              ['status:needs-review', 'Needs Manual Review'],
              ['status:needs-manual-review', 'Needs Manual Review'],
              ['status:validation', 'Needs Manual Review'],
              ['status:completed', 'Completed']
            ]);
            const statusPrecedence = ['status:completed', 'status:needs-manual-review', 'status:needs-review', 'status:validation', 'status:in-progress', 'status:ready', 'status:planned', 'status:ideas'];

            function labelNames(issue) {
              return (issue.labels || []).map(label => typeof label === 'string' ? label : label.name).filter(Boolean);
            }
            function statusFor(issue) {
              if (issue.state === 'closed') return 'Completed';
              const labels = new Set(labelNames(issue).map(norm));
              const found = statusPrecedence.find(label => labels.has(label));
              return found ? statusByLabel.get(found) : 'Planned';
            }
            function typeFor(issue) {
              const labels = new Set(labelNames(issue).map(norm));
              if (labels.has('type:bug')) return 'Bug';
              if (labels.has('type:feature')) return 'Feature';
              if (labels.has('type:refactor')) return 'Refactor';
              if (labels.has('type:docs')) return 'Docs';
              if (labels.has('type:spike')) return 'Spike';
              if (labels.has('type:chore')) return 'Chore';
              return null;
            }
            function priorityFor(issue) {
              const labels = new Set(labelNames(issue).map(norm));
              if (labels.has('priority:p0')) return ['P0', 0];
              if (labels.has('priority:p1') || labels.has('priority:01-now') || labels.has('priority:02-next')) return ['P1', 1];
              if (labels.has('priority:p2') || labels.has('priority:03-soon')) return ['P2', 2];
              if (labels.has('priority:p3') || labels.has('priority:04-later') || labels.has('priority:05-icebox')) return ['P3', 3];
              return [null, null];
            }
            async function loadProject() {
              const result = await github.graphql(`query($login: String!, $number: Int!) { user(login: $login) { projectV2(number: $number) { id fields(first: 100) { nodes { __typename ... on ProjectV2Field { id name dataType } ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }`, { login: projectOwner, number: projectNumber });
              const project = result.user.projectV2;
              const fields = new Map(project.fields.nodes.filter(Boolean).map(field => [field.name, field]));
              return { project, fields };
            }
            function optionId(field, value) {
              if (!field || !value || !field.options) return null;
              return field.options.find(option => norm(option.name) === norm(value))?.id || null;
            }
            async function findOrAddItem(projectId, issue) {
              const existing = await github.graphql(`query($issue: ID!) { node(id: $issue) { ... on Issue { projectItems(first: 100) { nodes { id project { id } } } } } }`, { issue: issue.node_id });
              const found = existing.node.projectItems.nodes.find(item => item.project.id === projectId);
              if (found) return found.id;
              const added = await github.graphql(`mutation($projectId: ID!, $contentId: ID!) { addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } } }`, { projectId, contentId: issue.node_id });
              return added.addProjectV2ItemById.item.id;
            }
            async function setSingleSelect(projectId, itemId, field, value) {
              const selected = optionId(field, value);
              if (!selected) return;
              await github.graphql(`mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId itemId: $itemId fieldId: $fieldId value: { singleSelectOptionId: $optionId } }) { projectV2Item { id } } }`, { projectId, itemId, fieldId: field.id, optionId: selected });
            }
            async function setNumber(projectId, itemId, field, value) {
              if (!field || field.dataType !== 'NUMBER' || value === null || value === undefined) return;
              await github.graphql(`mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId itemId: $itemId fieldId: $fieldId value: { number: $value } }) { projectV2Item { id } } }`, { projectId, itemId, fieldId: field.id, value: Number(value) });
            }
            async function syncIssue(project, fields, issue) {
              if (issue.pull_request) return;
              const itemId = await findOrAddItem(project.id, issue);
              const [priority, priorityScore] = priorityFor(issue);
              await setSingleSelect(project.id, itemId, fields.get('Status'), statusFor(issue));
              await setSingleSelect(project.id, itemId, fields.get('Area'), defaultArea);
              await setSingleSelect(project.id, itemId, fields.get('Type'), typeFor(issue));
              await setSingleSelect(project.id, itemId, fields.get('Priority'), priority);
              await setNumber(project.id, itemId, fields.get('Priority Score'), priorityScore);
              core.info(`Synced issue #${issue.number}: ${issue.title}`);
            }

            const { project, fields } = await loadProject();
            let issues = [];
            if (context.eventName === 'workflow_dispatch' && context.payload.inputs.issue_number) {
              const issue = (await github.rest.issues.get({ owner, repo, issue_number: Number(context.payload.inputs.issue_number) })).data;
              issues = [issue];
            } else if (context.eventName === 'issues') {
              issues = [context.payload.issue];
            } else {
              issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'all', per_page: 100 });
            }
            for (const issue of issues.filter(issue => !issue.pull_request)) await syncIssue(project, fields, issue);
