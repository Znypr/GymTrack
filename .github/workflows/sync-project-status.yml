name: Sync GitHub Project status

on:
  issues:
    types: [opened, reopened, closed, labeled, unlabeled]
  pull_request:
    types: [opened, reopened, converted_to_draft, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to synchronize
        required: true
        type: number

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: project-status-${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-project:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PROJECT_OWNER: Znypr
      PROJECT_NUMBER: "1"

    steps:
      - name: Synchronize issue status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GYMTRACK_PROJECT_TOKEN }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const { owner: repositoryOwner, repo } = context.repo;

            const normalize = value => value.trim().toLowerCase();

            const statusCandidates = {
              Triage: ["Triage", "Todo", "To do", "Backlog"],
              Backlog: ["Backlog", "Todo", "To do"],
              Ready: ["Ready", "Todo", "To do", "Backlog"],
              Blocked: ["Blocked", "Todo", "To do", "In Progress"],
              "Needs decision": ["Needs decision", "Blocked", "Todo", "To do"],
              "In Progress": ["In Progress", "In progress", "Doing"],
              Review: ["Review", "In Review", "In progress", "In Progress"],
              Done: ["Done", "Complete", "Completed"]
            };

            async function getProject() {
              const result = await github.graphql(
                `query($login: String!, $number: Int!) {
                  user(login: $login) {
                    projectV2(number: $number) {
                      id
                      title
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }`,
                { login: projectOwner, number: projectNumber }
              );

              const project = result.user?.projectV2;
              if (!project) {
                throw new Error(`Project ${projectOwner} #${projectNumber} was not found.`);
              }

              const statusField = project.fields.nodes.find(
                field => field?.name === "Status"
              );
              if (!statusField) {
                throw new Error(`Project "${project.title}" has no single-select Status field.`);
              }

              return { project, statusField };
            }

            async function findOrAddProjectItem(projectId, issue) {
              let cursor = null;

              do {
                const result = await github.graphql(
                  `query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            id
                            content {
                              ... on Issue {
                                id
                              }
                            }
                          }
                        }
                      }
                    }
                  }`,
                  { projectId, cursor }
                );

                const connection = result.node.items;
                const existing = connection.nodes.find(
                  item => item.content?.id === issue.node_id
                );
                if (existing) {
                  return existing.id;
                }

                cursor = connection.pageInfo.hasNextPage
                  ? connection.pageInfo.endCursor
                  : null;
              } while (cursor);

              const added = await github.graphql(
                `mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {
                    projectId: $projectId
                    contentId: $contentId
                  }) {
                    item {
                      id
                    }
                  }
                }`,
                { projectId, contentId: issue.node_id }
              );

              return added.addProjectV2ItemById.item.id;
            }

            function selectOption(statusField, desiredStatus) {
              const candidates = statusCandidates[desiredStatus] ?? [desiredStatus];

              for (const candidate of candidates) {
                const option = statusField.options.find(
                  item => normalize(item.name) === normalize(candidate)
                );
                if (option) {
                  return option;
                }
              }

              return null;
            }

            async function setProjectStatus(
              projectId,
              itemId,
              statusField,
              desiredStatus,
              issueNumber
            ) {
              const option = selectOption(statusField, desiredStatus);
              if (!option) {
                core.warning(
                  `No compatible Status option for "${desiredStatus}". ` +
                  `Available options: ${statusField.options.map(item => item.name).join(", ")}`
                );
                return;
              }

              await github.graphql(
                `mutation(
                  $projectId: ID!
                  $itemId: ID!
                  $fieldId: ID!
                  $optionId: String!
                ) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: {
                      singleSelectOptionId: $optionId
                    }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }`,
                {
                  projectId,
                  itemId,
                  fieldId: statusField.id,
                  optionId: option.id
                }
              );

              core.info(`Set issue #${issueNumber} to "${option.name}".`);
            }

            function desiredIssueStatus(issue, pullRequest) {
              const labels = new Set(
                issue.labels.map(label =>
                  typeof label === "string" ? label : label.name
                )
              );

              if (issue.state === "closed" || pullRequest?.merged) {
                return "Done";
              }
              if (labels.has("status:blocked")) {
                return "Blocked";
              }
              if (labels.has("status:needs-decision")) {
                return "Needs decision";
              }
              if (labels.has("status:needs-triage")) {
                return "Triage";
              }
              if (pullRequest && pullRequest.state === "open") {
                return pullRequest.draft ? "In Progress" : "Review";
              }
              if (labels.has("status:ready")) {
                return "Ready";
              }
              return "Backlog";
            }

            function closingIssueNumbersFromBody(body) {
              const numbers = new Set();
              const pattern = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi;
              for (const match of body?.matchAll(pattern) ?? []) {
                numbers.add(Number(match[1]));
              }
              return [...numbers];
            }

            async function issuesLinkedToPullRequest(pullRequest) {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 50) {
                        nodes {
                          number
                        }
                      }
                    }
                  }
                }`,
                {
                  owner: repositoryOwner,
                  repo,
                  number: pullRequest.number
                }
              );

              const linked = result.repository.pullRequest
                .closingIssuesReferences.nodes.map(issue => issue.number);

              return [...new Set([
                ...linked,
                ...closingIssueNumbersFromBody(pullRequest.body)
              ])];
            }

            let issueNumbers = [];
            let pullRequest = null;

            if (context.eventName === "workflow_dispatch") {
              issueNumbers = [Number(context.payload.inputs.issue_number)];
            } else if (context.eventName === "issues") {
              issueNumbers = [context.payload.issue.number];
            } else if (context.eventName === "pull_request") {
              pullRequest = context.payload.pull_request;
              issueNumbers = await issuesLinkedToPullRequest(pullRequest);
            }

            issueNumbers = issueNumbers.filter(
              number => Number.isInteger(number) && number > 0
            );

            if (!issueNumbers.length) {
              core.info("No linked issues require synchronization.");
              return;
            }

            const { project, statusField } = await getProject();

            for (const issueNumber of issueNumbers) {
              const issue = (await github.rest.issues.get({
                owner: repositoryOwner,
                repo,
                issue_number: issueNumber
              })).data;

              if (issue.pull_request) {
                core.warning(`#${issueNumber} is a pull request, not an issue. Skipping.`);
                continue;
              }

              const itemId = await findOrAddProjectItem(project.id, issue);
              const desiredStatus = desiredIssueStatus(issue, pullRequest);
              await setProjectStatus(
                project.id,
                itemId,
                statusField,
                desiredStatus,
                issueNumber
              );
            }
